<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market Magnate Login</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top left, rgba(29,111,232,.16), transparent 26%),
        radial-gradient(circle at top right, rgba(66,183,42,.10), transparent 20%),
        linear-gradient(180deg,#dbe4ee 0%, #d2dce7 48%, #cad5e0 100%);
      padding:24px;
    }
    .loginShell{
      width:min(100%, 430px);
      background:rgba(248,250,252,.92);
      border:1px solid #d7dee7;
      border-radius:11px;
      padding:28px;
      box-shadow:0 24px 60px rgba(15,23,42,.12);
      backdrop-filter:blur(14px);
    }
    .loginTop{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }
    .loginMark{
      width:58px;height:58px;border-radius:11px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#0f8bff,#1dc86a);
      color:#fff;font-weight:900;font-size:1.1rem;
      box-shadow:0 14px 30px rgba(24,119,242,.22);
    }
    .loginTitle{
      text-align:center;
      font-size:1.85rem;
      font-weight:950;
      line-height:1;
      margin:0;
    }
    .loginSub{
      text-align:center;
      color:#667589;
      margin:10px 0 22px;
      line-height:1.5;
      font-size:.95rem;
    }
    .loginStack{display:grid;gap:12px}
    .loginActions{display:grid;gap:10px;margin-top:14px}
    .loginActions button,.loginActions a{
      width:100%;
      justify-content:center;
      text-decoration:none;
    }
    .loginMeta{
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid #e7edf4;
      display:grid;
      gap:8px;
      color:#667589;
      font-size:.9rem;
    }
    .leaderPeek{
      margin-top:20px;
      padding:14px;
      border-radius:11px;
      background:#eef4fb;
      border:1px solid #dbe5f2;
    }
    .leaderPeek h3{
      margin:0 0 10px;
      font-size:.95rem;
    }
    .miniLead{display:grid;gap:8px}
    .miniLeadRow{
      display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
      padding:10px 12px;border-radius:11px;background:#fff;border:1px solid var(--line);
    }
    .miniRank{
      width:30px;height:30px;border-radius:9px;background:#edf3fb;display:grid;place-items:center;
      font-weight:900;color:#2f537d;
    }
  
html,body{cursor:auto !important;}}


html,body,*{cursor:auto !important}
}


html, body, body *, body *::before, body *::after { cursor:auto !important; }
}


html, body, body *, body *::before, body *::after { cursor:auto !important; }
}


:root{
  --bg:#0f1218;
  --panel:#161b24;
  --panel2:#1b2230;
  --text:#ecf0f6;
  --muted:#9aa6b2;
  --line:#283142;
  --gold:#d4a928;
  --gold-2:#f1c84b;
}
html,body{
  background:linear-gradient(180deg,#0f1218 0%,#121722 100%) !important;
  color:var(--text) !important;
}
.loginCard,.sectionCard,.leaderPeek,.profileCard,.miniLeadRow,.loginMeta,.tableWrap{
  background:var(--panel) !important;
  color:var(--text) !important;
  border-color:var(--line) !important;
  box-shadow:none !important;
}
.muted,.loginSub,.loginMeta,#authStatus{color:var(--muted) !important;}
h1,h2,h3,h4,h5,h6,strong,b,.loginTitle{color:var(--text) !important;}
input,textarea,select{
  background:#0f141d !important;
  color:var(--text) !important;
  border-color:var(--line) !important;
}
input::placeholder,textarea::placeholder{color:#778394 !important;}
button,.buttonish{
  background:linear-gradient(180deg,var(--gold-2),var(--gold)) !important;
  color:#17130a !important;
  border-color:#9d7e1b !important;
}
button.secondary{background:#1a2230 !important;color:var(--text) !important;border-color:var(--line) !important;}
.loginMark,.miniRank{background:linear-gradient(180deg,var(--gold-2),var(--gold)) !important;color:#17130a !important;}
table,th,td{color:var(--text) !important;border-color:var(--line) !important;}
a{color:#ffd761;}


/* v58 refined dark gold index theme */
:root{
  --bg:#090d14;
  --panel:#121927;
  --panel2:#172133;
  --text:#eef3fb;
  --muted:#94a0b2;
  --line:#253144;
  --gold:#d4a928;
  --gold2:#f2cf66;
}
html,body{
  background:
    radial-gradient(circle at top left, rgba(212,169,40,.14), transparent 26%),
    radial-gradient(circle at top right, rgba(212,169,40,.07), transparent 20%),
    linear-gradient(180deg,#090d14 0%, #0d131d 46%, #101724 100%) !important;
  color:var(--text) !important;
}
body{
  align-items:flex-start !important;
  justify-content:center !important;
  padding:34px 18px 40px !important;
}
.loginBoard{
  width:min(100%, 1120px) !important;
  display:grid !important;
  grid-template-columns:minmax(360px, 430px) minmax(0, 1fr) !important;
  gap:18px !important;
  align-items:start !important;
}
.loginCard,.sectionCard,.leaderPeek,.profileCard,.tableWrap,.miniLeadRow{
  background:linear-gradient(180deg, rgba(18,25,37,.96), rgba(14,20,30,.96)) !important;
  border:1px solid rgba(255,255,255,.08) !important;
  color:var(--text) !important;
  box-shadow:0 20px 44px rgba(0,0,0,.34) !important;
}
.loginCard,.sectionCard,.leaderPeek{ border-radius:20px !important; }
.loginTop{ margin-bottom:18px !important; }
.loginMark{
  width:54px !important; height:54px !important; border-radius:14px !important;
  background:linear-gradient(180deg,var(--gold2),var(--gold)) !important;
  color:#17120a !important;
  box-shadow:0 12px 24px rgba(212,169,40,.22) !important;
}
.loginTitle{ color:#f7f9fd !important; font-size:2rem !important; }
.loginSub,.muted,#authStatus,.loginMeta,.loginMeta *{ color:var(--muted) !important; }
.sectionCard h3,.leaderPeek h3,strong,b{ color:#f4f7fc !important; }

input,textarea,select{
  background:#0b1119 !important;
  color:#f2f7ff !important;
  border:1px solid #253144 !important;
  border-radius:12px !important;
}
input::placeholder,textarea::placeholder{ color:#76859a !important; }

button,.buttonish{
  background:linear-gradient(180deg,var(--gold2),var(--gold)) !important;
  color:#17120a !important;
  border:1px solid #8d6f18 !important;
  box-shadow:0 10px 22px rgba(212,169,40,.18) !important;
}
button.secondary{
  background:linear-gradient(180deg,#182233,#121a28) !important;
  border:1px solid #2a374a !important;
  color:var(--text) !important;
  box-shadow:none !important;
}
.ownedInventory .invAvatarBtn,.ownedBannerInventory .invBannerBtn,.miniLeadRow{
  background:linear-gradient(180deg, rgba(20,29,43,.96), rgba(15,22,33,.96)) !important;
  border-color:rgba(255,255,255,.07) !important;
  color:var(--text) !important;
}
.miniLeadRow{
  border-radius:14px !important;
}
.miniLeadRow:hover{ background:rgba(26,37,53,.98) !important; }
.tableWrap table, table, th, td{
  color:#edf2fa !important;
  border-color:rgba(255,255,255,.08) !important;
}
a{ color:#ffd76d; }

@media (max-width: 980px){
  .loginBoard{ grid-template-columns:1fr !important; }
}

</style>

</head>
<body>
  <main class="loginBoard">
    <section class="loginCard">
      <div class="loginTop">
        <div class="loginMark">MM</div>
      </div>
      <h1 class="loginTitle">Market Magnate</h1>
      <p class="loginSub">Sign in to sync your save, manage your profile, and compete on the live leaderboard.</p>

      <div class="loginStack">
        <input id="authEmail" type="email" placeholder="Email" />
        <input id="authPassword" type="password" placeholder="Password" />
        <input id="authUsername" type="text" placeholder="Username for new accounts" />
      </div>

      <div class="loginActions">
        <button id="signInBtn">Sign in</button>
        <button id="signUpBtn">Create account</button>
        <button id="signOutBtn" class="secondary" hidden>Sign out</button>
</div>

      <p id="authMessage" class="muted" style="margin-top:14px;text-align:center">Not signed in</p>
      <div class="loginMeta">
        <div id="authStatus">Not signed in</div>
      </div>
    </section>

    <section class="loginSide">
      <section class="leaderPeek sectionCard" style="margin-top:0">
        <h3>Account Details</h3>
        <form id="profileForm" class="loginStack">
          <input id="profileUsername" type="text" placeholder="Username" />
          <input id="profileDisplayName" type="text" placeholder="Display name" />
          <textarea id="profileBio" placeholder="Bio" style="min-height:82px"></textarea>
          <input id="profileFavoriteStock" type="text" placeholder="Favorite stock" />
          
        <div class="inventorySection">
          <div class="inventoryLabel">Owned Avatars</div>
          <div id="ownedAvatarInventory" class="ownedInventory"></div>
        </div>
        <div class="inventorySection">
          <div class="inventoryLabel">Owned Banners</div>
          <div id="ownedBannerInventory" class="ownedBannerInventory"></div>
        </div>
        <select id="profileTheme">
            <option value="default">Default</option>
            <option value="luxury">Luxury</option>
            <option value="neon">Neon</option>
            <option value="midnight">Midnight</option>
          </select>
          <button type="submit">Save account details</button>
          <div id="profileMessage" class="muted"></div>
        </form>
      </section>

      <section class="leaderPeek sectionCard" id="publicProfileCard" style="display:none;margin-top:0"><h3>Player Profile</h3><div id="publicProfileBody"></div></section>

      <section class="leaderPeek sectionCard">
        <h3>Online Players <span id="onlineCount" class="muted" style="font-weight:700"></span></h3>
        <div id="onlinePlayersList" class="miniLead"><div class="muted">Checking activity…</div></div>
      </section>

      <section class="leaderPeek sectionCard">
        <h3>Leaderboard</h3>
        <div class="tableWrap" style="max-height:320px;overflow:auto">
          <table>
            <thead>
              <tr><th>#</th><th>User</th><th>Net Worth</th><th>Empire</th></tr>
            </thead>
            <tbody id="signinLeaderboardBody"><tr><td colspan="4">Loading…</td></tr></tbody>
          </table>
        </div>
      </section>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./supabase-client.js"></script>
  <script src="./social.js"></script>
  
  


  <!-- hidden full leaderboard/profile containers for social.js -->
  <div style="display:none"><button id="syncBtn"></button><button id="loadBtn"></button><table><tbody id="leaderboardBody"><tr><td colspan="5">Loading…</td></tr></tbody></table></div>









</body>
