<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market Magnate Login</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./avatar.css" />
  <style>
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      max-width:100vw;
      box-sizing:border-box;
      background:#0b0b13;
      background-image:
        radial-gradient(ellipse 90% 70% at 12% 8%, rgba(138,43,226,.16), transparent 42%),
        radial-gradient(ellipse 80% 60% at 88% 18%, rgba(59,91,253,.12), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.45));
      padding:24px;
    }
    .loginShell{
      width:min(100%, 430px);
      background:rgba(22,22,32,.92);
      border:1px solid rgba(255,255,255,.1);
      border-radius:16px;
      padding:28px;
      box-shadow:0 24px 60px rgba(0,0,0,.45),0 0 48px rgba(138,43,226,.15);
      backdrop-filter:blur(16px);
    }
    .loginTop{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }
    .loginMark{
      width:58px;height:58px;border-radius:14px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#8a2be2,#d100d1);
      color:#fff;font-weight:900;font-size:1.1rem;
      box-shadow:0 14px 40px rgba(138,43,226,.28);
    }
    .loginTitle{
      text-align:center;
      font-size:1.85rem;
      font-weight:950;
      line-height:1;
      margin:0;
    }
    .loginSub{
      text-align:center;
      color:var(--muted);
      margin:10px 0 22px;
      line-height:1.5;
      font-size:.95rem;
    }
    .loginStack{display:grid;gap:12px}
    .loginActions{display:grid;gap:10px;margin-top:14px}
    .loginActions button,.loginActions a{
      width:100%;
      justify-content:center;
      text-decoration:none;
    }
    .loginMeta{
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid rgba(255,255,255,.08);
      display:grid;
      gap:8px;
      color:var(--muted);
      font-size:.9rem;
    }
    .leaderPeek{
      margin-top:20px;
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);
    }
    .leaderPeek h3{
      margin:0 0 10px;
      font-size:.95rem;
    }
    .miniLead{display:grid;gap:8px;min-width:0}
    .miniLeadRow{
      display:grid;
      grid-template-columns:auto minmax(0,1fr) minmax(0,38%);
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);
      min-width:0;
      max-width:100%;
      text-decoration:none;
      color:inherit;
    }
    .miniLbMid{min-width:0;overflow:hidden}
    .miniLbName{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .miniLbSub{font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .miniLbAmtCol{min-width:0;text-align:right}
    .miniLbAmt{
      font-weight:900;
      font-variant-numeric:tabular-nums;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:#e8d4ff;
    }
    .miniRank{
      width:30px;height:30px;border-radius:9px;background:rgba(138,43,226,.2);display:grid;place-items:center;
      font-weight:900;color:#e8d4ff;flex-shrink:0;border:1px solid rgba(255,255,255,.08);
    }
    main.loginBoard{min-width:0;max-width:100%}
    .leaderPeek .tableWrap{min-width:0;max-width:100%}
    .leaderPeek .tableWrap table.hubLeaderTable{
      table-layout:fixed;
      width:100%;
    }
    .leaderPeek .tableWrap table.hubLeaderTable th,
    .leaderPeek .tableWrap table.hubLeaderTable td{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:0;
    }
    .leaderPeek .tableWrap table.hubLeaderTable th:nth-child(1),
    .leaderPeek .tableWrap table.hubLeaderTable td:nth-child(1){width:40px}
    .leaderPeek .tableWrap table.hubLeaderTable th:nth-child(3),
    .leaderPeek .tableWrap table.hubLeaderTable td:nth-child(3){width:32%}
    html,body,body *,body *::before,body *::after{cursor:auto !important}
  </style>

</head>
<body>
  <main class="loginBoard">
    <section class="loginCard">
      <div class="loginTop">
        <div class="loginMark">MM</div>
      </div>
      <h1 class="loginTitle">Market Magnate</h1>
      <p class="loginSub" id="hubLoginSub">Choose <b>Sign in</b> or <b>Create account</b>. After you are signed in, you can edit this account’s profile, then press <b>Play game</b> to load your cloud save and enter the market.</p>

      <div id="hubAuthChoice" class="loginActions">
        <button type="button" id="hubPickSignIn">Sign in</button>
        <button type="button" id="hubPickSignUp">Create account</button>
      </div>

      <div id="hubAuthStage" class="loginStack" hidden style="margin-top:4px">
        <input id="authEmail" type="email" placeholder="Email" autocomplete="username" />
        <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password" />
        <div id="hubUsernameRow" class="usernameRow loginStack" hidden>
          <input id="authUsername" type="text" placeholder="Username for new accounts" autocomplete="nickname" />
        </div>
        <div class="loginActions" style="margin-top:4px">
          <button type="button" id="signInBtn" hidden>Sign in</button>
          <button type="button" id="signUpBtn" hidden>Create account</button>
          <button type="button" id="hubAuthBack" class="secondary">Back</button>
        </div>
      </div>

      <div id="hubSignedInRow" class="loginActions" hidden style="margin-top:14px">
        <button id="playBtn" type="button">Play game</button>
        <button type="button" id="signOutBtn" class="secondary">Sign out</button>
      </div>

      <p id="authMessage" class="muted" style="margin-top:14px;text-align:center">Not signed in</p>
      <div class="loginMeta">
        <div id="authStatus">Not signed in</div>
      </div>
    </section>

    <section class="loginSide">
      <section class="leaderPeek sectionCard">
        <h3>Leaderboard</h3>
        <div class="tableWrap" style="max-height:320px;overflow:auto">
          <table class="hubLeaderTable">
            <thead>
              <tr><th>#</th><th>User</th><th>Net Worth</th><th>Empire</th></tr>
            </thead>
            <tbody id="signinLeaderboardBody"><tr><td colspan="4">Loading…</td></tr></tbody>
          </table>
        </div>
      </section>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./supabase-client.js"></script>
  <script src="./avatar-engine.js"></script>
  <script src="./social.js"></script>
  
  


  <!-- hidden full leaderboard/profile containers for social.js -->
  <div style="display:none"><button id="syncBtn"></button><button id="loadBtn"></button><table><tbody id="leaderboardBody"><tr><td colspan="5">Loading…</td></tr></tbody></table></div>









</body>
