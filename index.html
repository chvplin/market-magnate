<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market Magnate Login</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top left, rgba(29,111,232,.16), transparent 26%),
        radial-gradient(circle at top right, rgba(66,183,42,.10), transparent 20%),
        linear-gradient(180deg,#dbe4ee 0%, #d2dce7 48%, #cad5e0 100%);
      padding:24px;
    }
    .loginShell{
      width:min(100%, 430px);
      background:rgba(248,250,252,.92);
      border:1px solid #d7dee7;
      border-radius:11px;
      padding:28px;
      box-shadow:0 24px 60px rgba(15,23,42,.12);
      backdrop-filter:blur(14px);
    }
    .loginTop{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }
    .loginMark{
      width:58px;height:58px;border-radius:11px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#0f8bff,#1dc86a);
      color:#fff;font-weight:900;font-size:1.1rem;
      box-shadow:0 14px 30px rgba(24,119,242,.22);
    }
    .loginTitle{
      text-align:center;
      font-size:1.85rem;
      font-weight:950;
      line-height:1;
      margin:0;
    }
    .loginSub{
      text-align:center;
      color:#667589;
      margin:10px 0 22px;
      line-height:1.5;
      font-size:.95rem;
    }
    .loginStack{display:grid;gap:12px}
    .loginActions{display:grid;gap:10px;margin-top:14px}
    .loginActions button,.loginActions a{
      width:100%;
      justify-content:center;
      text-decoration:none;
    }
    .loginMeta{
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid #e7edf4;
      display:grid;
      gap:8px;
      color:#667589;
      font-size:.9rem;
    }
    .leaderPeek{
      margin-top:20px;
      padding:14px;
      border-radius:11px;
      background:#eef4fb;
      border:1px solid #dbe5f2;
    }
    .leaderPeek h3{
      margin:0 0 10px;
      font-size:.95rem;
    }
    .miniLead{display:grid;gap:8px}
    .miniLeadRow{
      display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
      padding:10px 12px;border-radius:11px;background:#fff;border:1px solid var(--line);
    }
    .miniRank{
      width:30px;height:30px;border-radius:9px;background:#edf3fb;display:grid;place-items:center;
      font-weight:900;color:#2f537d;
    }
  </style>
</head>
<body>
  <main class="loginShell">
    <div class="loginTop">
      <div class="loginMark">MM</div>
    </div>

    <h1 class="loginTitle">Market Magnate</h1>
    <p class="loginSub">Sign in to sync your save, manage your profile, and compete on the live leaderboard.</p>

    <div class="loginStack">
      <input id="authEmail" type="email" placeholder="Email" />
      <input id="authPassword" type="password" placeholder="Password" />
      <input id="authUsername" type="text" placeholder="Username for new accounts" />
    </div>

    <div class="loginActions">
      <button id="signInBtn">Sign in</button>
      <button id="signUpBtn">Create account</button>
      <button id="signOutBtn" class="secondary" hidden>Sign out</button>
      <button id="playBtn" hidden>Play game</button>
      <a class="buttonish" href="./game.html">Open game manually</a>
    </div>

    <p id="authMessage" class="muted" style="margin-top:14px;text-align:center">Not signed in</p>

    
    <section class="leaderPeek">
      <h3>Leaderboard</h3>
      <div class="tableWrap" style="max-height:280px;overflow:auto">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>User</th>
              <th>Net Worth</th>
            </tr>
          </thead>
          <tbody id="signinLeaderboardBody">
            <tr><td colspan="3">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
    

    <div class="loginMeta">
      <div id="authStatus">Not signed in</div>
      <div>Public profiles work with <code>?u=username</code></div>
      
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./supabase-client.js"></script>
  <script src="./social.js"></script>
  
  <script>
    (function(){
      const source = document.getElementById('leaderboardBody');
      const target = document.getElementById('signinLeaderboardBody');
      function syncBoard(){
        if(!source || !target) return;
        const rows = [...source.querySelectorAll('tr')];
        const valid = rows.filter(r => r.children.length >= 5 && !/loading|failed|no players/i.test(r.textContent)).slice(0,10);
        target.innerHTML = valid.map(r => `
          <tr>
            <td>${r.children[0].textContent}</td>
            <td>${r.children[1].textContent}</td>
            <td>${r.children[2].textContent}</td>
          </tr>
        `).join('') || '<tr><td colspan="3">Leaderboard loading…</td></tr>';
      }
      setInterval(syncBoard, 1200);
      document.addEventListener('DOMContentLoaded', syncBoard);
    })();
  </script>


  <!-- hidden full leaderboard/profile containers for social.js -->
  <div style="display:none">
    <button id="syncBtn"></button><button id="loadBtn"></button>
    <form id="profileForm"></form>
    <input id="profileDisplayName" />
    <textarea id="profileBio"></textarea>
    <input id="profileFavoriteStock" />
    <select id="profileTheme"></select>
    <div id="profileMessage"></div>
    <table><tbody id="leaderboardBody"><tr><td colspan="5">Loading…</td></tr></tbody></table>
    <div id="publicProfileBody"></div>
  </div>
</body>
</html>
